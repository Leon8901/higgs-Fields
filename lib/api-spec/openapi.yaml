openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Higgsfield AI platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tools
    description: AI tools and models
  - name: apps
    description: Community apps built on Higgsfield
  - name: pricing
    description: Pricing plans
  - name: stats
    description: Platform statistics
  - name: waitlist
    description: Waitlist signup
  - name: models
    description: Generative AI model catalog
  - name: generations
    description: Media generation jobs
  - name: me
    description: Current user profile
  - name: credits
    description: Credit ledger
  - name: api-keys
    description: User-supplied (BYOK) provider API keys
  - name: storage
    description: Object storage upload and serving endpoints
  - name: billing
    description: Razorpay-backed subscriptions and one-time credit purchases
  - name: avatars
    description: Saved spokesperson avatars for Marketing Studio
  - name: settings
    description: Public, database-driven site configuration
  - name: admin
    description: Owner-only site administration

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tools:
    get:
      operationId: listTools
      tags: [tools]
      summary: List all AI tools
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [image, video, audio, all]
          required: false
        - name: tag
          in: query
          schema:
            type: string
          required: false
      responses:
        "200":
          description: List of tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tool"

  /tools/featured:
    get:
      operationId: listFeaturedTools
      tags: [tools]
      summary: List featured/hero tools for homepage
      responses:
        "200":
          description: Featured tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tool"

  /tools/{id}:
    get:
      operationId: getTool
      tags: [tools]
      summary: Get a single tool by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tool details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /apps:
    get:
      operationId: listApps
      tags: [apps]
      summary: List community apps
      parameters:
        - name: filter
          in: query
          schema:
            type: string
            enum: [all, featured, trending, new]
          required: false
        - name: search
          in: query
          schema:
            type: string
          required: false
      responses:
        "200":
          description: List of apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/App"

  /apps/stats:
    get:
      operationId: getAppStats
      tags: [apps]
      summary: App gallery statistics (total, trending count, new this week)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppStats"

  /pricing:
    get:
      operationId: listPricingPlans
      tags: [pricing]
      summary: List pricing plans
      responses:
        "200":
          description: All pricing plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PricingPlan"

  /credit-packs:
    get:
      operationId: listCreditPacks
      tags: [billing]
      summary: List one-time credit purchase packs
      responses:
        "200":
          description: All credit packs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreditPack"

  /billing/status:
    get:
      operationId: getBillingStatus
      tags: [billing]
      summary: Whether Razorpay credentials are configured yet
      responses:
        "200":
          description: Billing configuration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingStatus"

  /billing/subscribe:
    post:
      operationId: subscribe
      tags: [billing]
      summary: Start a Razorpay subscription checkout for a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeRequest"
      responses:
        "200":
          description: Subscription created; open Razorpay Checkout with this id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscribeResult"
        "400":
          description: Unknown plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Razorpay request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Payment processing not yet configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/purchase-credits:
    post:
      operationId: purchaseCredits
      tags: [billing]
      summary: Start a Razorpay one-time order for a credit pack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseCreditsRequest"
      responses:
        "200":
          description: Order created; open Razorpay Checkout with this id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseCreditsResult"
        "400":
          description: Unknown credit pack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Razorpay request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Payment processing not yet configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getPlatformStats
      tags: [stats]
      summary: Platform-level stats for the hero section
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /waitlist:
    post:
      operationId: joinWaitlist
      tags: [waitlist]
      summary: Join the waitlist / newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistInput"
      responses:
        "201":
          description: Joined successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistEntry"
        "409":
          description: Already on waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getPublicSettings
      tags: [settings]
      summary: Get all publicly-readable site settings (never includes the internal settings version)
      responses:
        "200":
          description: Public settings map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicSettings"

  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get every site setting plus its registry metadata (owner-only)
      responses:
        "200":
          description: All settings with registry metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSetting"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminSettings
      tags: [admin]
      summary: Update one or more site settings (owner-only, all-or-nothing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsPatch"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSetting"
        "400":
          description: Validation failed — no fields were written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/settings/export:
    get:
      operationId: getAdminSettingsExport
      tags: [admin]
      summary: Export all settings as a flat key→value JSON file (owner-only)
      responses:
        "200":
          description: Flat key→value map of all settings (sent as a downloadable attachment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettingsExport"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/settings/import:
    post:
      operationId: importAdminSettings
      tags: [admin]
      summary: Import settings from a flat JSON export (owner-only, all-or-nothing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSettingsExport"
      responses:
        "200":
          description: Updated settings array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSetting"
        "400":
          description: Validation failed — no fields were written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/settings/reset-defaults:
    post:
      operationId: resetAdminSettingsToDefaults
      tags: [admin]
      summary: Reset every setting to its registry default (owner-only, destructive)
      responses:
        "200":
          description: Updated settings array after reset
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSetting"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/settings/health:
    get:
      operationId: getAdminSettingsHealth
      tags: [admin]
      summary: Real infrastructure health checks + last-saved time for the admin panel (owner-only)
      responses:
        "200":
          description: Health status for database and object storage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminHealthStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/settings/import-asset:
    post:
      operationId: importAdminAsset
      tags: [admin]
      summary: Fetch a public image URL server-side, validate, and re-host on our own storage (owner-only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminProviderIconBody"
      responses:
        "200":
          description: Owned asset path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAssetImportResult"
        "400":
          description: Invalid URL, non-image content, or exceeds 5 MB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/providers:
    get:
      operationId: listAdminProviders
      tags: [admin]
      summary: All providers with platform key info, model counts, and live discovery (owner-only)
      responses:
        "200":
          description: Providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminProvider"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/providers/{slug}:
    patch:
      operationId: patchAdminProvider
      tags: [admin]
      summary: Update provider fields (owner-only)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminProviderPatch"
      responses:
        "200":
          description: Updated provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProvider"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/providers/{slug}/platform-key:
    post:
      operationId: setAdminProviderPlatformKey
      tags: [admin]
      summary: Validate (if possible) and store a platform API key for a provider (owner-only)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminProviderPlatformKeyBody"
      responses:
        "200":
          description: Updated provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProvider"
        "400":
          description: Key rejected by provider or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Provider validation call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAdminProviderPlatformKey
      tags: [admin]
      summary: Remove stored platform key and force platformEnabled to false (owner-only)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated provider (key cleared)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProvider"
        "404":
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/providers/{slug}/test-connection:
    post:
      operationId: testAdminProviderConnection
      tags: [admin]
      summary: Live pass/fail test using the stored platform key (owner-only)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProviderTestResult"
        "400":
          description: No key saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/providers/{slug}/icon:
    post:
      operationId: setAdminProviderIconUrl
      tags: [admin]
      summary: Fetch a public image URL and set it as the provider icon (owner-only, paste-URL path)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminProviderIconBody"
      responses:
        "200":
          description: Updated provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProvider"
        "400":
          description: Invalid URL or non-image content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /models:
    get:
      operationId: listModels
      tags: [models]
      summary: List all generation models
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [image, video, audio, all]
          required: false
      responses:
        "200":
          description: List of models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Model"

  /models/{modelId}:
    get:
      operationId: getModel
      tags: [models]
      summary: Get a single model by its stable modelId slug
      parameters:
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Model details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Model"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get the current authenticated user's profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/plan:
    post:
      operationId: switchPlan
      tags: [me]
      summary: Switch the current user's plan and grant that plan's monthly credits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchPlanRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeProfile"
        "400":
          description: Unknown plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /credits/ledger:
    get:
      operationId: listCreditLedger
      tags: [credits]
      summary: List the current user's credit ledger entries, most recent first
      responses:
        "200":
          description: Ledger entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreditLedgerEntry"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /generations:
    get:
      operationId: listGenerations
      tags: [generations]
      summary: List the current user's generations, most recent first
      responses:
        "200":
          description: Generations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Generation"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createGeneration
      tags: [generations]
      summary: Submit a new generation job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerationInput"
      responses:
        "201":
          description: Generation created and submitted to the provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Generation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "402":
          description: Insufficient credits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /generations/{id}:
    get:
      operationId: getGeneration
      tags: [generations]
      summary: Get a generation's current status, polling the provider if still processing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Generation"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteGeneration
      tags: [generations]
      summary: Delete a generation from the user's library
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api-keys:
    get:
      operationId: listApiKeys
      tags: [api-keys]
      summary: List the current user's configured BYOK provider keys (masked)
      responses:
        "200":
          description: Configured keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKeySummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: upsertApiKey
      tags: [api-keys]
      summary: Add or replace a BYOK provider API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyInput"
      responses:
        "200":
          description: Key stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeySummary"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /providers:
    get:
      operationId: listProviders
      tags: [api-keys]
      summary: List BYOK-capable providers (data-driven — drives the "Add Your Keys" panel)
      responses:
        "200":
          description: Providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Provider"

  /providers/{slug}/voices:
    get:
      operationId: listProviderVoices
      tags: [api-keys]
      summary: >
        List the voices actually available on the caller's own connected
        account for a voice-capable provider (e.g. ElevenLabs). Requires a
        valid, connected BYOK key for that provider — there is no platform
        fallback, since voices are account-specific. Never hardcoded: the
        list reflects exactly what the provider account can use right now.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Voices available on the caller's connected account
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderVoice"
        "400":
          description: No connected key for this provider, or provider has no voice catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Provider could not be reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api-keys/{provider}:
    delete:
      operationId: deleteApiKey
      tags: [api-keys]
      summary: Remove a configured BYOK provider API key
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /avatars:
    get:
      operationId: listAvatars
      tags: [avatars]
      summary: List the current user's saved avatars
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of avatars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Avatar"
    post:
      operationId: createAvatar
      tags: [avatars]
      summary: Save a new avatar
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAvatarInput"
      responses:
        "201":
          description: Created avatar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Avatar"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /avatars/{id}:
    patch:
      operationId: updateAvatar
      tags: [avatars]
      summary: Rename a saved avatar
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvatarInput"
      responses:
        "200":
          description: Updated avatar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Avatar"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAvatar
      tags: [avatars]
      summary: Delete a saved avatar
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Tool:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        tagline:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [image, video, audio]
        badge:
          type: ["string", "null"]
          description: "e.g. NEW, TRENDING, HOT"
        isFeatured:
          type: boolean
        thumbnailUrl:
          type: ["string", "null"]
        gradient:
          type: ["string", "null"]
          description: "CSS gradient string for fallback display"
        accentColor:
          type: ["string", "null"]
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - tagline
        - description
        - category
        - isFeatured
        - sortOrder
        - createdAt

    App:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        gradient:
          type: ["string", "null"]
        authorName:
          type: string
        authorAvatarUrl:
          type: ["string", "null"]
        isFeatured:
          type: boolean
        isTrending:
          type: boolean
        isNew:
          type: boolean
        viewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - authorName
        - isFeatured
        - isTrending
        - isNew
        - viewCount
        - createdAt

    AppStats:
      type: object
      properties:
        total:
          type: integer
        trending:
          type: integer
        newThisWeek:
          type: integer
      required:
        - total
        - trending
        - newThisWeek

    PricingPlan:
      type: object
      properties:
        id:
          type: integer
        planKey:
          type: string
          description: "Stable key: starter | plus | ultra — matches a user's planKey"
        name:
          type: string
        price:
          type: number
          description: Monthly price in USD
        yearlyPrice:
          type: number
          description: Effective monthly price in USD when billed yearly
        creditsPerMonth:
          type: integer
        description:
          type: string
        features:
          type: array
          items:
            type: string
        isPopular:
          type: boolean
        ctaLabel:
          type: string
        sortOrder:
          type: integer
      required:
        - id
        - planKey
        - name
        - price
        - yearlyPrice
        - creditsPerMonth
        - description
        - features
        - isPopular
        - ctaLabel
        - sortOrder

    CreditPack:
      type: object
      properties:
        id:
          type: integer
        packKey:
          type: string
        name:
          type: string
        credits:
          type: integer
        priceUsd:
          type: number
        isPopular:
          type: boolean
        sortOrder:
          type: integer
      required:
        - id
        - packKey
        - name
        - credits
        - priceUsd
        - isPopular
        - sortOrder

    BillingStatus:
      type: object
      properties:
        configured:
          type: boolean
          description: False until RAZORPAY_KEY_ID/RAZORPAY_KEY_SECRET are set — checkout will fail gracefully until then.
      required:
        - configured

    SubscribeRequest:
      type: object
      properties:
        planKey:
          type: string
        interval:
          type: string
          enum: [monthly, yearly]
      required:
        - planKey
        - interval

    SubscribeResult:
      type: object
      properties:
        subscriptionId:
          type: string
          description: Razorpay subscription id — pass to Checkout.js as subscription_id
        razorpayKeyId:
          type: string
          description: Public Razorpay key id for the Checkout.js widget
      required:
        - subscriptionId
        - razorpayKeyId

    PurchaseCreditsRequest:
      type: object
      properties:
        packKey:
          type: string
      required:
        - packKey

    PurchaseCreditsResult:
      type: object
      properties:
        orderId:
          type: string
          description: Razorpay order id — pass to Checkout.js as order_id
        razorpayKeyId:
          type: string
        amount:
          type: integer
          description: Amount in paise (INR), matching what Checkout.js expects
      required:
        - orderId
        - razorpayKeyId
        - amount

    ModelParamField:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, textarea, select, number, toggle, image]
        options:
          type: array
          items:
            type: string
        dynamicOptions:
          type: ["string", "null"]
          description: >
            When set (e.g. "voices"), the frontend should fetch live options
            from GET /providers/{adapter}/voices using the model's own BYOK
            key instead of relying solely on the static `options` list. Used
            for provider-account-specific choices (e.g. ElevenLabs voices)
            that cannot be hardcoded — the static `options`/`default` remain
            as a fallback shown before a key is connected or if the live
            fetch fails.
        default:
          description: Default value; type depends on `type`.
        required:
          type: boolean
        min:
          type: number
        max:
          type: number
        step:
          type: number
        helpText:
          type: ["string", "null"]
      required:
        - key
        - label
        - type

    BannerContent:
      type: object
      description: Shape shared by homepage_banner and announcement.
      properties:
        enabled:
          type: boolean
        text:
          type: string
        linkUrl:
          type: string
        linkLabel:
          type: string
      required:
        - enabled
        - text

    PublicSettings:
      type: object
      description: Every isPublic=true site setting, keyed by setting key. Never includes the internal settings version.
      properties:
        site_name:
          type: string
        site_tagline:
          type: string
        logo_url:
          type: string
        favicon_url:
          type: string
        theme_color:
          type: string
        maintenance_mode:
          type: boolean
        maintenance_message:
          type: string
        registration_enabled:
          type: boolean
        platform_generation_enabled:
          type: boolean
        default_credits:
          type: integer
        default_image_model_slug:
          type: string
        default_video_model_slug:
          type: string
        default_audio_model_slug:
          type: string
        homepage_banner:
          $ref: "#/components/schemas/BannerContent"
        announcement:
          $ref: "#/components/schemas/BannerContent"
      required:
        - site_name
        - site_tagline
        - logo_url
        - favicon_url
        - theme_color
        - maintenance_mode
        - maintenance_message
        - registration_enabled
        - platform_generation_enabled
        - default_credits
        - default_image_model_slug
        - default_video_model_slug
        - default_audio_model_slug
        - homepage_banner
        - announcement

    AdminSetting:
      type: object
      description: One site setting row, joined with its Configuration Registry metadata.
      properties:
        key:
          type: string
        type:
          type: string
          enum: [string, boolean, number, json]
        category:
          type: string
        label:
          type: string
        description:
          type: string
        isPublic:
          type: boolean
        value: {}
      required:
        - key
        - type
        - category
        - label
        - description
        - isPublic
        - value

    SettingsPatch:
      type: object
      description: Partial map of setting key -> new value. Every key must be a known registry key; every value is validated server-side before anything is written. The whole request fails atomically if any field is invalid.
      additionalProperties: true

    AdminSettingsExport:
      type: object
      description: Flat key→value map of all settings — the shape produced by export and consumed by import.
      additionalProperties: true

    AdminHealthCheckItem:
      type: object
      properties:
        connected:
          type: boolean
      required:
        - connected

    AdminHealthStatus:
      type: object
      properties:
        database:
          $ref: "#/components/schemas/AdminHealthCheckItem"
        objectStorage:
          $ref: "#/components/schemas/AdminHealthCheckItem"
        lastSavedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - database
        - objectStorage

    ModelParamsSchema:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ModelParamField"
      required:
        - fields

    Model:
      type: object
      properties:
        id:
          type: integer
        modelId:
          type: string
          description: Stable internal slug used in URLs and generation requests
        name:
          type: string
        category:
          type: string
          enum: [image, video, audio]
        description:
          type: string
        badge:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        isFeatured:
          type: boolean
        isActive:
          type: boolean
        sortOrder:
          type: integer
        adapter:
          type: string
        basePriceUsd:
          type: number
        creditCost:
          type: integer
        paramsSchema:
          $ref: "#/components/schemas/ModelParamsSchema"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - modelId
        - name
        - category
        - description
        - isFeatured
        - isActive
        - sortOrder
        - adapter
        - basePriceUsd
        - creditCost
        - paramsSchema
        - createdAt

    GenerationInput:
      type: object
      properties:
        modelId:
          type: ["string", "null"]
          description: Model slug to use; omit or null when autoSelect is true
        prompt:
          type: string
          minLength: 1
        params:
          type: object
          additionalProperties: true
          description: Provider-specific params (aspect ratio, duration, image URLs, etc.)
        autoSelect:
          type: boolean
          description: If true, an LLM picks the best-fit model for the prompt
        useOwnKey:
          type: boolean
          description: If true and the user has a BYOK key for the resolved model's provider, use it instead of the platform key
        skipEnhance:
          type: boolean
          description: If true, skip LLM prompt enhancement and use the prompt verbatim
      required:
        - prompt

    Generation:
      type: object
      properties:
        id:
          type: integer
        modelId:
          type: string
        modelName:
          type: string
        category:
          type: string
          enum: [image, video, audio]
        prompt:
          type: string
        params:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [pending, processing, completed, failed]
        outputType:
          type: string
          enum: [image, video, audio]
        outputUrls:
          type: array
          items:
            type: string
        creditsCharged:
          type: integer
        usedOwnKey:
          type: boolean
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - modelId
        - modelName
        - category
        - prompt
        - params
        - status
        - outputType
        - outputUrls
        - creditsCharged
        - usedOwnKey
        - createdAt

    MeProfile:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        displayName:
          type: ["string", "null"]
        planKey:
          type: string
        creditsBalance:
          type: integer
        hasOwnKey:
          type: boolean
        isOwner:
          type: boolean
          description: Grants access to the owner-only Site Settings admin panel.
        subscriptionStatus:
          type: ["string", "null"]
          description: "active | pending | halted | cancelled | completed | null (no Razorpay subscription)"
        billingInterval:
          type: ["string", "null"]
          description: "monthly | yearly | null"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - planKey
        - creditsBalance
        - hasOwnKey
        - isOwner
        - createdAt

    SwitchPlanRequest:
      type: object
      properties:
        planKey:
          type: string
          description: "One of: free | starter | plus | ultra"
      required:
        - planKey

    CreditLedgerEntry:
      type: object
      properties:
        id:
          type: integer
        delta:
          type: integer
        reason:
          type: string
        balanceAfter:
          type: integer
        generationId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - delta
        - reason
        - balanceAfter
        - createdAt

    ApiKeyInput:
      type: object
      properties:
        provider:
          type: string
          minLength: 1
          description: Provider slug, e.g. "wavespeed". Must match an active, BYOK-capable row from GET /providers.
        apiKey:
          type: string
          minLength: 1
      required:
        - provider
        - apiKey

    ApiKeySummary:
      type: object
      properties:
        provider:
          type: string
        lastFour:
          type: string
        status:
          type: string
          enum: [valid, invalid, unknown]
          description: Result of validating this key against the provider before it was saved.
        validatedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - provider
        - lastFour
        - status
        - validatedAt
        - createdAt

    Provider:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        icon:
          type: ["string", "null"]
        capabilities:
          type: array
          items:
            type: string
        supportsByok:
          type: boolean
        keyFormatHint:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        docsUrl:
          type: ["string", "null"]
        status:
          type: string
          description: active | disabled — controls BYOK availability for users
        unavailableMessage:
          type: ["string", "null"]
          description: Message shown to users when status is disabled
      required:
        - slug
        - name
        - icon
        - capabilities
        - supportsByok
        - keyFormatHint
        - description
        - docsUrl
        - status

    AdminProvider:
      type: object
      description: Full provider row for the owner admin panel — includes platform key info, model counts, and live discovery
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        icon:
          type: ["string", "null"]
        capabilities:
          type: array
          items:
            type: string
        supportsByok:
          type: boolean
        keyFormatHint:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        docsUrl:
          type: ["string", "null"]
        status:
          type: string
        sortOrder:
          type: integer
        unavailableMessage:
          type: ["string", "null"]
        baseUrl:
          type: ["string", "null"]
        metadata:
          type: object
          additionalProperties: true
        hasAdapter:
          type: boolean
          description: True if a code adapter is registered — required to route platform generation
        platformEnabled:
          type: boolean
        platformKeyLastFour:
          type: ["string", "null"]
        platformKeyStatus:
          type: ["string", "null"]
          description: valid | invalid | unknown | null
        platformKeyValidatedAt:
          type: ["string", "null"]
          format: date-time
        modelsCataloged:
          type: integer
        modelsEnabled:
          type: integer
        liveAvailableModels:
          type: ["array", "null"]
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
            required: [id, name]
        liveAvailableModelsReason:
          type: ["string", "null"]
      required:
        - id
        - slug
        - name
        - capabilities
        - supportsByok
        - status
        - sortOrder
        - hasAdapter
        - platformEnabled
        - modelsCataloged
        - modelsEnabled

    AdminProviderPatch:
      type: object
      properties:
        platformEnabled:
          type: boolean
        baseUrl:
          type: ["string", "null"]
        metadata:
          type: object
          additionalProperties: true
        sortOrder:
          type: integer
        status:
          type: string
          enum: [active, disabled]
        description:
          type: ["string", "null"]
        docsUrl:
          type: ["string", "null"]
        keyFormatHint:
          type: ["string", "null"]
        unavailableMessage:
          type: ["string", "null"]
        icon:
          type: ["string", "null"]

    AdminProviderPlatformKeyBody:
      type: object
      required: [apiKey]
      properties:
        apiKey:
          type: string
          minLength: 1

    AdminProviderTestResult:
      type: object
      properties:
        testable:
          type: boolean
        ok:
          type: boolean
        message:
          type: string
        reason:
          type: string
      required: [testable]

    AdminAssetImportResult:
      type: object
      properties:
        path:
          type: string
          description: Owned /api/storage/objects/… path — always starts with /api/storage
      required: [path]

    AdminProviderIconBody:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: Public https URL to fetch and re-host

    ProviderVoice:
      type: object
      properties:
        id:
          type: string
          description: Opaque provider voice ID — pass through as `voice_id` param verbatim.
        name:
          type: string
      required:
        - id
        - name

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    PlatformStats:
      type: object
      properties:
        videosGenerated:
          type: integer
        activeCreators:
          type: integer
        communityApps:
          type: integer
        modelsAvailable:
          type: integer
      required:
        - videosGenerated
        - activeCreators
        - communityApps
        - modelsAvailable

    WaitlistInput:
      type: object
      properties:
        email:
          type: string
        name:
          type: ["string", "null"]
      required:
        - email

    WaitlistEntry:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - createdAt

    Avatar:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        photoUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - photoUrl
        - createdAt
        - updatedAt

    CreateAvatarInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        photoUrl:
          type: string
      required:
        - name
        - photoUrl

    UpdateAvatarInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
      required:
        - name
