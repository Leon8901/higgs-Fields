kind = "web"
previewPath = "/"
title = "Higgsfield AI"
version = "1.0.0"
id = "artifacts/higgsfield"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25131

[services.development]
run = "pnpm --filter @workspace/higgsfield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/higgsfield", "run", "build" ]
serve = "static"
publicDir = "artifacts/higgsfield/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25131"
BASE_PATH = "/"
